      <p class="titulo-grupo">Tipo de pacote:</p>
      <div class="campo-opcao">
        <input
          type="radio"
          id="pacote-economico"
          name="pacote"
          value="Econômico"
        />
        <label for="pacote-economico">Econômico</label>
      </div>
      <div class="campo-opcao">
        <input
          type="radio"
          id="pacote-conforto"
          name="pacote"
          value="Conforto"
        />
        <label for="pacote-conforto">Conforto</label>
      </div>
      <div class="campo-opcao">
        <input type="radio" id="pacote-premium" name="pacote" value="Premium" />
        <label for="pacote-premium">Premium</label>
      </div>

      <p>Cidade-sede (select):</p>
      <label for="cidade">Cidade:</label>
      <select id="cidade" name="cidade">
        <option value="">Selecione...</option>
        <option value="cdmx">Cidade do México</option>
        <option value="ny">Nova York</option>
        <option value="la">Los Angeles</option>
      </select>

      <label for="anuncio">Descrição do anúncio:</label>

      <textarea id="anuncio" rows="4" cols="40" maxlength="200"></textarea>
      <p id="contador">0/200 caracteres</p>

      <button type="submit">Entrar</button>
    </form>
