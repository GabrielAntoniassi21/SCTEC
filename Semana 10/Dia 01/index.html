<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/styles/index.style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Página de Contato</title>
  </head>
  <body>
    <header class="cabecalho">
      <img
        src="https://www.origamid.com/projetos/bikcraft/img/bikcraft.svg"
        alt="Logo da Bikcraft"
        class="logo"
      />

      <nav class="menu">
        <a href="#">Bicicletas</a>
        <a href="#">Seguros</a>
        <a href="#">Contatos</a>
      </nav>
    </header>

    <section class="hero">
      <p class="hero-sub">Respostas em até 24 horas</p>
      <h1 class="hero-titulo">
        nosso contato<span class="cor-destaque">.</span>
      </h1>
    </section>

    <main class="conteudo">
      <form class="formulario" id="formulario">
        <div>
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" placeholder="Seu nome" />
          <p id="erro-nome"></p>
        </div>
        <div>
          <label for="telefone">Telefone</label>
          <input
            type="tel"
            id="telefone"
            name="telefone"
            placeholder="(47) 99999-9999"
          />
          <p id="erro-telefone"></p>
        </div>

        <div>
          <label for="email">Email</label>
          <input
            type="text"
            id="email"
            name="email"
            placeholder="contato@email.com"
          />
          <p id="erro-email"></p>
        </div>

        <div>
          <label for="mensagem">Mensagem</label>
          <textarea
            name="mensagem"
            id="mensagem"
            rows="5"
            placeholder="O que você precisa?"
          ></textarea>
          <p id="erro-mensagem"></p>
        </div>

        <button type="submit" class="botao">Enviar mensagem</button>

        <p id="mensagem-erro"></p>
      </form>
    </main>

    <script src="./assets/scripts/main.js"></script>
  </body>
</html>
